filter: brightness(0.85) contrast(0.9);
border-radius: 16px; }

        .timeline {
            width: 100%;

            position: relative;
            text-align: center;

        .timeline::before {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: 0;
            width: 20px;
            height: 60px;
            background: #8B4513;
            border-radius: 0 0 8px 8px;
            z-index: 0;
        }
        .timeline .item {
            position: relative;
            margin: 30px auto;
            cursor: pointer;
            transition: 0.3s;
            width: fit-content;
            opacity: 0;
            transform: translateY(40px);

<script>
// ========== 2048 内嵌游戏逻辑 ==========
// ========== 2048 内嵌游戏逻辑 ==========
let grid = [];
const game2048Mask = document.getElementById('game2048Mask');
const game2048Box = document.getElementById('game2048');

function open2048Game(){
    game2048Mask.style.display = 'flex';
    init2048();
}
function close2048Game(){
    game2048Mask.style.display = 'none';
}
function init2048(){
    grid = Array(4).fill().map(()=>Array(4).fill(0));
    addRandom();addRandom();
    render2048();
}
function addRandom(){
    let empty = [];
    for(let i=0;i<4;i++)for(let j=0;j<4;j++)if(grid[i][j]===0)empty.push([i,j]);
    if(!empty.length)return;
    let [x,y] = empty[Math.floor(Math.random()*empty.length)];
    grid[x][y] = Math.random()>0.1?2:4;
}
function render2048(){
    let colorMap = {
        2:'#eee4da',4:'#ede0c8',8:'#f2b179',16:'#f59563',
        32:'#f67c5f',64:'#f65e3b',128:'#edcf72',256:'#edcc61',
        512:'#edc850',1024:'#edc53f',2048:'#edc22e'
    };
    game2048Box.innerHTML = '<div id="grid-container"></div>';
    let container = document.getElementById('grid-container');
    for(let i=0;i<4;i++){
        for(let j=0;j<4;j++){
            let cell = document.createElement('div');
            cell.className = 'grid-cell';
            let val = grid[i][j];
            cell.innerText = val||'';
            cell.style.background = colorMap[val]||'#cdc1b4';
            cell.style.color = val<=4?'#776e65':'#f9f6f2';
            container.appendChild(cell);
        }
    }
}
document.addEventListener('keydown',e=>{
    if(game2048Mask.style.display!=='flex')return;
    if(e.key==='ArrowUp') moveUp();
    if(e.key==='ArrowDown') moveDown();
    if(e.key==='ArrowLeft') moveLeft();
    if(e.key==='ArrowRight') moveRight();
    render2048();
});
function moveLeft(){
    for(let i=0;i<4;i++){
        let row = grid[i].filter(v=>v);
        for(let j=0;j<row.length-1;j++){
            if(row[j]===row[j+1]){row[j]*=2;row.splice(j+1,1);}
        }
        while(row.length<4)row.push(0);
        grid[i] = row;
    }
    addRandom();
}
function moveRight(){
    for(let i=0;i<4;i++){
        let row = grid[i].filter(v=>v);
        for(let j=row.length-1;j>0;j--){
            if(row[j]===row[j-1]){row[j]*=2;row.splice(j-1,1);}
        }
        while(row.length<4)row.unshift(0);
        grid[i] = row;
    }
    addRandom();
}
function moveUp(){
    for(let j=0;j<4;j++){
        let col = [];
        for(let i=0;i<4;i++)if(grid[i][j])col.push(grid[i][j]);
        for(let i=0;i<col.length-1;i++){
            if(col[i]===col[i+1]){col[i]*=2;col.splice(i+1,1);}
        }
        for(let i=0;i<4;i++)grid[i][j] = col[i]||0;
    }
    addRandom();
}
function moveDown(){
    for(let j=0;j<4;j++){
        let col = [];
        for(let i=0;i<4;i++)if(grid[i][j])col.push(grid[i][j]);
        for(let i=col.length-1;i>0;i--){
            if(col[i]===col[i-1]){col[i]*=2;col.splice(i-1,1);}
        }
        let idx = 3;
        for(let i=col.length-1;i>=0;i--)grid[idx--][j] = col[i];
        while(idx>=0)grid[idx--][j]=0;
    }
    addRandom();
}

const gameMask = document.getElementById('gameMask');
const gameContainer = document.getElementById('gameContainer');
const scoreEl = document.getElementById('score');
let score = 0;
let gameRunning = false;

// 加入终极图片
const fruitImages = [
    "img/1777623105709.png",
    "img/1777623110102.png",
    "img/1777623110121.png",
    "img/1777623111886.png",
    "img/1777623122047.png",
    "img/1777623130877.png",
    "img/IMG_20260501_144530.jpg" // 终极图片
];

function openGame() {
    if(gameRunning) return;
    gameMask.style.display = 'flex';
    score = 0;
    scoreEl.textContent = score;
    gameContainer.innerHTML = '';
    gameRunning = true;
    spawnFruit();
}
function closeGame() {
    gameMask.style.display = 'none';
    gameContainer.innerHTML = '';
    gameRunning = false;
    score = 0;
    scoreEl.textContent = score;
}

function spawnFruit(){
    if(!gameRunning) return;
    let type = Math.floor(Math.random() * 6);
    let x = 140;
    let fruit = createFruit(type, x, 10);
    gameContainer.appendChild(fruit);

    let dir = 2;
    function move(){
        if(!gameRunning || !fruit.parentNode) return;
        let leftVal = parseFloat(fruit.style.left);
        leftVal += dir;
        if(leftVal < 10 || leftVal > 280) dir = -dir;
        fruit.style.left = leftVal + 'px';
        requestAnimationFrame(move);
    }
    move();

    gameMask.onclick = function(e){
        if(e.target.classList.contains('game-close') || e.target === gameMask) return;
        gameMask.onclick = null;
        dropFruit(fruit);
    };
}

function createFruit(type, x, y) {
    let size = 40 + type * 12;
    const el = document.createElement('div');
    el.className = 'fruit';
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.style.backgroundImage = `url(${fruitImages[type]})`;
    el.dataset.type = type;
    return el;
}

function dropFruit(fruit){
    let speed = 4;
    function fall(){
        let topVal = parseFloat(fruit.style.top);
        topVal += speed;
        fruit.style.top = topVal + 'px';
        if(topVal >= 520 - parseFloat(fruit.style.height)){
            checkMerge(fruit);
            return;
        }
        requestAnimationFrame(fall);
    }
    fall();
}

function checkMerge(newFruit){
    let all = document.querySelectorAll('.fruit');
    let newRect = newFruit.getBoundingClientRect();
    let merged = false;

    for(let item of all){
        if(item === newFruit) continue;
        let itemRect = item.getBoundingClientRect();
        let dx = Math.abs(newRect.left - itemRect.left);
        let dy = Math.abs(newRect.top - itemRect.top);
        let t1 = parseInt(newFruit.dataset.type);
        let t2 = parseInt(item.dataset.type);

        if(dx < 40 && dy < 40 && t1 === t2){
            newFruit.remove();
            item.remove();
            score += (t1+1)*10;
            scoreEl.textContent = score;

            // 合成终极图片 → 通关
            if(t1 === fruitImages.length - 2){
                gameRunning = false;
                setTimeout(()=>{
                    document.getElementById('quizMask').style.display = 'flex';
                },500);
                return;
            }

            let newType = t1 + 1;
            let newOne = createFruit(newType, parseFloat(item.style.left), parseFloat(item.style.top));
            gameContainer.appendChild(newOne);
            merged = true;
            break;
        }
    }
    setTimeout(()=>{ if(gameRunning) spawnFruit(); },300);
}
